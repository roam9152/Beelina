name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [Development]

jobs:
  preview:
    # Only run for feature branches (created by Copilot agent or custom Beelina agents)
    if: startsWith(github.head_ref, 'Features/')
    name: Build & smoke-test preview stack
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      DB_SA_PASSWORD: ${{ secrets.PREVIEW_DB_SA_PASSWORD }}
      API_SECRET_TOKEN: ${{ secrets.PREVIEW_API_SECRET_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Unit tests (fast, no Docker needed — uses SQLite in-memory) ──────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        id: unit_tests
        run: dotnet test Beelina.UnitTest --no-build --configuration Release --verbosity normal
        continue-on-error: true

      # ── Full stack spin-up ─────────────────────────────────────────────────
      - name: Start Docker Compose stack
        run: |
          docker compose up --build -d
          echo "Waiting for all services to be healthy..."

      - name: Wait for API to be ready
        id: api_health
        run: |
          echo "Polling http://localhost:8080/health ..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is healthy after $((i * 5))s"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "  attempt $i/40 — retrying in 5s..."
            sleep 5
          done
          echo "healthy=false" >> $GITHUB_OUTPUT
          docker compose logs api
          exit 1
        continue-on-error: true

      # ── Database init + seed ───────────────────────────────────────────────
      - name: Initialize & seed databases
        id: db_init
        if: steps.api_health.outputs.healthy == 'true'
        run: |
          set -e

          echo "→ Migrating system DB..."
          curl -sf -X POST http://localhost:8080/api/systemdbmanager/syncDatabase

          echo "→ Migrating developer client DB..."
          curl -sf -X POST http://localhost:8080/api/clientdbmanager/syncDatabase

          echo "→ Seeding default GeneralInformation row in system DB..."
          docker compose exec -T db /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "$DB_SA_PASSWORD" -No \
            -Q "IF NOT EXISTS (SELECT 1 FROM dbBeelinaSYSSQL.dbo.GeneralInformations) \
                INSERT INTO dbBeelinaSYSSQL.dbo.GeneralInformations \
                (SystemUpdateStatus, IsActive, IsDelete, DateCreated, DateUpdated, DateDeleted, DateDeactivated) \
                VALUES (0, 1, 0, GETUTCDATE(), GETUTCDATE(), '1900-01-01', '1900-01-01')"

          echo "→ Seeding developer client DB with preview test user..."
          curl -sf -X POST http://localhost:8080/api/clientdbmanager/populateDatabase \
            -H "Content-Type: application/json" \
            -d '{"userAccountDto":{"firstName":"Preview","middleName":"","lastName":"User","gender":0,"emailAddress":"preview@test.com"},"clientDto":{"name":"Preview Client","type":0}}'

          echo "All database init steps completed."
        continue-on-error: true

      # ── Login smoke test (GraphQL) ─────────────────────────────────────────
      - name: Login smoke test
        id: login_test
        if: steps.db_init.outcome == 'success'
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8080/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { login(loginInput: { username: \"prus\", password: \"Starta123\" }) { accessToken } }"}')
          echo "Login response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"accessToken"'; then
            echo "Login succeeded."
          else
            echo "Login failed — accessToken not found in response."
            exit 1
          fi
        continue-on-error: true

      - name: Smoke-test Angular app
        id: app_health
        if: steps.api_health.outputs.healthy == 'true'
        run: |
          STATUS=$(curl -o /dev/null -w "%{http_code}" -sf http://localhost:4200 || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "Angular app returned HTTP $STATUS"
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      # ── Post results as PR comment ──────────────────────────────────────────
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const unitTests   = '${{ steps.unit_tests.outcome }}';
            const apiHealth   = '${{ steps.api_health.outputs.healthy }}';
            const dbInit      = '${{ steps.db_init.outcome }}';
            const loginTest   = '${{ steps.login_test.outcome }}';
            const appHealth   = '${{ steps.app_health.outputs.healthy }}';

            const icon = (ok) => ok === 'true' || ok === 'success' ? '✅' : '❌';

            const body = [
              `## 🧪 Preview Environment Results`,
              ``,
              `| Check | Status |`,
              `|-------|--------|`,
              `| Unit Tests (\`dotnet test\`) | ${icon(unitTests)} ${unitTests} |`,
              `| API Health (\`/health\`) | ${icon(apiHealth)} ${apiHealth === 'true' ? 'healthy' : 'failed'} |`,
              `| DB Init & Seed | ${icon(dbInit)} ${dbInit} |`,
              `| Login Smoke Test (GraphQL) | ${icon(loginTest)} ${loginTest} |`,
              `| Angular App (HTTP 200) | ${icon(appHealth)} ${appHealth === 'true' ? 'healthy' : 'failed / skipped'} |`,
              ``,
              `> ℹ️ The preview environment runs inside the GitHub Actions runner and is not publicly accessible.`,
              `> It validates that the full stack builds and starts correctly on isolated infrastructure.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      # ── Always tear down ───────────────────────────────────────────────────
      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v --remove-orphans
