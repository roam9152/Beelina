services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "${DB_SA_PASSWORD}",
          "-Q", "SELECT 1",
          "-No"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Beelina.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: PreviewEnv
      # Override connection strings so the SA password never lives in appsettings
      ConnectionStrings__BeelinaDBConnection: "Data Source=db,1433;Initial Catalog=dbBeelinaSYSSQL;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__BeelinaClientDeveloperDBConnection: "Data Source=db,1433;Initial Catalog=BeelinaDeveloper;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__BeelinaClientIntegrationTestDBTemplateConnection: "Data Source=db,1433;Initial Catalog=BeelinaDeveloperIntegrationTestDB;TrustServerCertificate=True;"
      DbUserAccountDefaultsSettings__DbServer: "db"
      DbUserAccountDefaultsSettings__DbPort: "1433"
      DbUserAccountDefaultsSettings__DbUsername: "sa"
      DbUserAccountDefaultsSettings__DbPassword: "${DB_SA_PASSWORD}"
      AppSettings__GeneralSettings__Token: "${API_SECRET_TOKEN}"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: ./Beelina.APP
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
